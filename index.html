// 배열 무작위 섞기 (Fisher-Yates)
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

const categories = ["이사 랭킹", "지역별 추천", "장거리이사", "이사 견적", "보관이사", "서울지역", "인천/경기", "부산/영남", "사무실이사", "특수이사"];

function init() {
    const shuffledData = shuffle([...rawData]);
    const shuffledCats = shuffle([...categories]);
    
    // 카테고리 버튼 생성
    const nav = document.getElementById('categoryNav');
    shuffledCats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.textContent = cat;
        btn.onclick = () => filterServices(cat);
        nav.appendChild(btn);
    });

    renderCards(shuffledData);
}

function renderCards(data) {
    const grid = document.getElementById('servicesGrid');
    grid.innerHTML = '';
    
    data.forEach(item => {
        const card = document.createElement('article');
        card.className = 'service-card';
        card.setAttribute('data-category', item.cat);
        
        card.innerHTML = `
            <span class="tag"># ${item.cat}</span>
            <h3>${item.title}</h3>
            <a href="${item.url}" target="_blank" class="desc-link" title="${item.title} 상세 보기">
                ${item.desc}
            </a>
            <a href="${item.url}" target="_blank" class="cta-btn">무료 견적 받기</a>
        `;
        grid.appendChild(card);
    });
}

function filterServices(category) {
    // 버튼 활성화 처리
    const btns = document.querySelectorAll('.cat-btn');
    btns.forEach(btn => {
        btn.classList.toggle('active', btn.textContent === category || (category === '전체' && btn.textContent === '전체보기'));
    });

    // 필터링 애니메이션 처리
    const cards = document.querySelectorAll('.service-card');
    cards.forEach(card => {
        if (category === '전체' || card.getAttribute('data-category') === category) {
            card.style.display = 'flex';
            setTimeout(() => card.style.opacity = '1', 10);
        } else {
            card.style.opacity = '0';
            setTimeout(() => card.style.display = 'none', 300);
        }
    });
}

// 초기화 실행
window.onload = init;
</script>
